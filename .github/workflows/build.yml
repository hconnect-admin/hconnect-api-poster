name: Build and Release

# Triggered when a version tag is pushed, e.g. git tag v1.0.2 && git push origin v1.0.2
on:
  push:
    tags:
      - 'v*'

# Allow the workflow to create GitHub Releases and upload assets
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build
        env:
          # GITHUB_TOKEN is automatically provided — no manual secret needed
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
